<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />

    <title>Phena SMS | School Management System</title>

    <meta
      name="description"
      content="Phena SMS is a modern school management system for student records, fees, billing, payments, academic records, and school administration."
    />
    <meta name="author" content="Phena Systems" />
    <meta
      name="keywords"
      content="Phena SMS, Phena School Manager, school management system, school fees software, student records, school billing, school administration software"
    />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / Browser Colors -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- Open Graph: WhatsApp, Facebook, LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Phena SMS | School Management System" />
    <meta
      property="og:description"
      content="Manage students, fees, payments, billing, academic records, and school operations from one simple platform."
    />
    <meta property="og:site_name" content="Phena SMS" />
    <meta property="og:url" content="https://phenaschool.com" />
    <meta property="og:image" content="https://phenaschool.com/favicon.ico" />

    <!-- Twitter / X Preview -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Phena SMS | School Management System" />
    <meta
      name="twitter:description"
      content="A modern platform for school management, student records, school fees, billing, and payments."
    />
    <meta name="twitter:image" content="https://phenaschool.com/favicon.ico" />

    <!-- Search Engine -->
    <meta name="robots" content="index, follow" />

    <!-- CoreUI Theme Loader -->
    <script>
      const userMode = localStorage.getItem('coreui-free-vue-admin-template-theme')
      const systemDarkMode =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches

      if (userMode === 'dark' || (userMode !== 'light' && systemDarkMode)) {
        document.documentElement.dataset.coreuiTheme = 'dark'
      }
    </script>

    <!-- First Impression Loading Style -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f8fafc;
      }

      #app {
        min-height: 100vh;
      }

      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34%),
          linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      }

      .app-loading-card {
        width: min(420px, 100%);
        padding: 34px 26px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(226, 232, 240, 0.95);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        text-align: center;
        backdrop-filter: blur(14px);
      }

      .app-loading-logo {
        width: 76px;
        height: 76px;
        margin: 0 auto 18px;
        border-radius: 24px;
        background: linear-gradient(135deg, #2563eb, #22c55e);
        color: #ffffff;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 950;
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.28);
      }

      .app-loading-title {
        margin: 0;
        color: #0f172a;
        font-size: 28px;
        font-weight: 950;
        letter-spacing: -0.04em;
      }

      .app-loading-text {
        margin: 9px 0 0;
        color: #64748b;
        font-size: 15px;
        line-height: 1.6;
      }

      .app-loading-bar {
        width: 160px;
        height: 6px;
        margin: 22px auto 0;
        border-radius: 999px;
        background: #dbeafe;
        overflow: hidden;
      }

      .app-loading-bar::before {
        content: '';
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(135deg, #2563eb, #22c55e);
        animation: loadingSlide 1.2s ease-in-out infinite;
      }

      @keyframes loadingSlide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      <strong>
        Phena SMS requires JavaScript to run. Please enable JavaScript in your browser
        to continue.
      </strong>
    </noscript>

    <div id="app">
      <div class="app-loading">
        <div class="app-loading-card">
          <div class="app-loading-logo">P</div>
          <h1 class="app-loading-title">Phena SMS</h1>
          <p class="app-loading-text">
            Loading your school management workspace...
          </p>
          <div class="app-loading-bar"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
